name: max

# Production host is reserved: https://max.rm-syst.ru
# VDS reverse-proxy placeholder: ../deploy/Caddyfile, block FUTURE MAX

services:
  db:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MAX_DB_NAME:-max}
      POSTGRES_USER: ${MAX_DB_USER:-max}
      POSTGRES_PASSWORD: ${MAX_DB_PASSWORD:-max_local_password}
    volumes:
      - max_postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:${MAX_DB_HOST_PORT:-9811}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MAX_DB_USER:-max} -d ${MAX_DB_NAME:-max}"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  test_db:
    profiles: ["test"]
    image: pgvector/pgvector:pg18
    environment:
      POSTGRES_DB: max_test
      POSTGRES_USER: max_test
      POSTGRES_PASSWORD: max_test_password
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U max_test -d max_test"]
      interval: 2s
      timeout: 3s
      retries: 20
      start_period: 5s
    security_opt:
      - no-new-privileges:true

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_BOT_USERNAME: ${MAX_BOT_USERNAME:-se13507757_bot}
      MAX_API_BASE_URL: ${MAX_API_BASE_URL:-https://platform-api2.max.ru}
      MAX_POLL_TIMEOUT: ${MAX_POLL_TIMEOUT:-30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-KupiSpisok_Bot}
      ADMIN_BRIDGE_TOKEN: ${ADMIN_BRIDGE_TOKEN:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${MAX_DB_USER:-max}:${MAX_DB_PASSWORD:-max_local_password}@db:5432/${MAX_DB_NAME:-max}
    ports:
      - "127.0.0.1:${MAX_HOST_PORT:-9810}:8080"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=2)"
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

  max_bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_BOT_USERNAME: ${MAX_BOT_USERNAME:-se13507757_bot}
      MAX_API_BASE_URL: ${MAX_API_BASE_URL:-https://platform-api2.max.ru}
      MAX_POLL_TIMEOUT: ${MAX_POLL_TIMEOUT:-30}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${MAX_DB_USER:-max}:${MAX_DB_PASSWORD:-max_local_password}@db:5432/${MAX_DB_NAME:-max}
    command: ["python", "-m", "app.platforms.max.bot"]
    security_opt:
      - no-new-privileges:true

  telegram_bot:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-KupiSpisok_Bot}
      TELEGRAM_MINI_APP_URL: ${TELEGRAM_MINI_APP_URL:-https://max.rm-syst.ru/}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql+asyncpg://${MAX_DB_USER:-max}:${MAX_DB_PASSWORD:-max_local_password}@db:5432/${MAX_DB_NAME:-max}
    command: ["python", "-m", "app.platforms.telegram.bot"]
    security_opt:
      - no-new-privileges:true

  broadcast_worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_healthy
    environment:
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN:-}
      MAX_API_BASE_URL: ${MAX_API_BASE_URL:-https://platform-api2.max.ru}
      MAX_POLL_TIMEOUT: ${MAX_POLL_TIMEOUT:-30}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      BROADCAST_IDLE_SECONDS: ${BROADCAST_IDLE_SECONDS:-1.0}
      BROADCAST_SEND_DELAY_SECONDS: ${BROADCAST_SEND_DELAY_SECONDS:-0.12}
      DATABASE_URL: postgresql+asyncpg://${MAX_DB_USER:-max}:${MAX_DB_PASSWORD:-max_local_password}@db:5432/${MAX_DB_NAME:-max}
    command: ["python", "-m", "app.broadcast_worker"]
    security_opt:
      - no-new-privileges:true

  max_test:
    profiles: ["test"]
    build:
      context: .
      target: test
    depends_on:
      test_db:
        condition: service_healthy
    environment:
      MAX_BOT_TOKEN: test-token
      MAX_BOT_USERNAME: test_bot
      TELEGRAM_BOT_TOKEN: telegram-test-token
      TELEGRAM_BOT_USERNAME: telegram_test_bot
      DATABASE_URL: postgresql+asyncpg://max_test:max_test_password@test_db:5432/max_test
    command: ["sh", "-c", "alembic upgrade head && python -m app.db.seed && pytest -q -p no:cacheprovider"]
    security_opt:
      - no-new-privileges:true

volumes:
  max_postgres_data:
